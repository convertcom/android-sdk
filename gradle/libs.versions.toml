[versions]
# SDK release version — single source of truth for both published artifacts
# (`com.convert:sdk-android` and `com.convert:sdk-core`). Bumped automatically
# by semantic-release during a release build (see `release.config.mjs` and
# `scripts/bump-version.mjs`). Do NOT edit manually on main; bump via a
# conventional `feat:` / `fix:` commit and let the release pipeline update it.
# The `0.0.0` placeholder here is intentional: the first release on main will
# produce `v1.0.0` via semantic-release's no-prior-tag default, after which
# this value is always owned by the pipeline.
sdk-version = "0.0.0"

# Build tools — pinned by Architecture §"Verified Technology Versions (2026-03-23)"
kotlin = "2.3.20"
agp = "9.1.0"
detekt = "1.23.6"
vanniktechMavenPublish = "0.36.0"

# Kotlin libraries
kotlinxCoroutines = "1.10.2"
kotlinxSerialization = "1.10.0"

# Networking
okhttp = "5.3.0"

# AndroidX
lifecycleProcess = "2.10.0"
workRuntime = "2.11.1"
startupRuntime = "1.2.0"

# Hashing
murmurhash = "0.4.1"

# Test
junitJupiter = "5.11.4"
mockk = "1.13.13"

# Coverage — JetBrains-maintained Kotlin-native coverage tool. Pinned to the
# latest 0.9.x stable at the time of Story 1.3; upgrade only after verifying
# the DSL still accepts `reports { verify { rule { minBound(...) } } }`.
# 0.9.8 is the latest 0.9.x stable on the Kover GitHub releases page.
kover = "0.9.8"

[libraries]
# Kotlin
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinxCoroutines" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinxSerialization" }

# Networking
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }

# AndroidX
androidx-lifecycle-process = { module = "androidx.lifecycle:lifecycle-process", version.ref = "lifecycleProcess" }
androidx-work-runtime = { module = "androidx.work:work-runtime", version.ref = "workRuntime" }
androidx-startup = { module = "androidx.startup:startup-runtime", version.ref = "startupRuntime" }

# Hashing
murmurhash = { module = "com.goncalossilva:murmurhash", version.ref = "murmurhash" }

# Test
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junitJupiter" }
# Gradle 9 requires the JUnit Platform launcher to be on the test runtime classpath; the
# junit-jupiter aggregator no longer pulls it in transitively.
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }

# Detekt formatting ruleset — referenced by the root detekt subprojects config
detekt-formatting = { module = "io.gitlab.arturbosch.detekt:detekt-formatting", version.ref = "detekt" }

[plugins]
android-library = { id = "com.android.library", version.ref = "agp" }
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
vanniktech-maven-publish = { id = "com.vanniktech.maven.publish", version.ref = "vanniktechMavenPublish" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
