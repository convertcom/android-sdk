# Convert Android SDK detekt configuration
# Based on detekt 1.23.6 default config with zero-tolerance policy.
# Root build.gradle.kts sets buildUponDefaultConfig = true, so this file
# only needs to declare overrides — the rest is inherited.

build:
  # Zero-tolerance policy: any detekt finding fails the build.
  maxIssues: 0
  excludeCorrectable: false
  weights:
    # complexity: 2
    # LongParameterList: 1
    # style: 1
    # comments: 1

# Baseline is intentionally left unset for the initial scaffold. When the code
# base grows, a baseline file can be introduced via:
#   baseline: detekt-baseline.xml
# until then, every finding must be fixed.

config:
  validation: true
  warningsAsErrors: false
  # Excluded configuration properties are reported as errors. Add to this list
  # if a plugin introduces properties detekt does not know about.
  excludes: ''

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'

output-reports:
  active: true

# Formatting rules (ktlint-style) provided by detekt-formatting plugin.
formatting:
  active: true
  android: true
  autoCorrect: false

# --- Rule-set overrides ------------------------------------------------------
# The Story 1.2 public-API skeleton has a Builder with a fluent setter per
# ConvertConfig field. The JS-SDK reference (FR2) lists 19 setters Story 2.1
# wires actively (sdkKey, sdkKeySecret, environment, configEndpoint,
# trackEndpoint, dataRefreshInterval, batchSize, releaseInterval, hashSeed,
# maxTraffic, excludeExperienceIdHash, logLevel, trackingEnabled, cacheLevel,
# rulesKeysCaseSensitive, rulesNegation, rulesComparisonProcessor,
# networkSource, mapper) plus `data` and `build` — 21 functions total — each
# a deliberate ergonomic surface, not a smell. The default `TooManyFunctions`
# threshold of 11 is raised to 22 for classes (one cushion slot for the few
# FR2 options Story 2.1 defers — they would land in later stories). Files
# keep the default limit so organically growing modules still get flagged.
# (Story 1.2 AC-9 forbids @Suppress — config-level override is the
# prescribed mechanism.)
complexity:
  TooManyFunctions:
    thresholdInClasses: 23
    thresholdInObjects: 23
  # Story 2.1: ConvertSDK.internal constructor takes the full collaborator
  # graph (config, appContext, logger, dataStore, httpClient, eventManager,
  # dataManager) — seven distinct parameters, each a discrete dependency.
  # Bundling them into a "Collaborators" data class would add a wrapper with
  # no behaviour and obscure the dependency graph at the call site
  # (Builder.build). Raise LongParameterList's constructor threshold to 8
  # (from the default 7) to accommodate this single, load-bearing case; the
  # function threshold is kept at the default.
  LongParameterList:
    constructorThreshold: 8
  # Story 2.1: Builder.assembleConfig folds the optional nullable field groups
  # (api, bucketing, events, logger, network, rules) plus the top-level
  # ConvertConfig call. Each group is an independent `if (x != null || y
  # != null)` branch. This hits CyclomaticComplexMethod's default threshold
  # (15). Bumping the threshold by 3 permits the Story 2.1 shape without
  # fracturing the assembly into six helper functions that would hide the
  # one-to-one mapping between Builder fields and ConvertConfig shape. The
  # function stays linear (no loops, no nested branches) — complexity is
  # purely from the count of optional-group predicates.
  CyclomaticComplexMethod:
    threshold: 18
  # Story 2.1 / F-047: assembleConfig wires 21 builder fields into the
  # ConvertConfig graph (top-level + 6 nested config groups). After F-047
  # added rulesComparisonProcessor, networkSource, and mapper to the
  # active FR2 surface, the function is ~63 lines — one line per
  # field-group construction, no nested logic. Splitting into helpers
  # would obscure the one-to-one Builder-to-ConvertConfig mapping; raise
  # LongMethod's threshold from 60 to 65 instead.
  LongMethod:
    threshold: 65

# Story 2.1 introduces `EventManager.fire()` — a pub/sub dispatcher that
# invokes arbitrary consumer-supplied callbacks inside a try/catch. Per
# architecture §Error Recovery, SDK code must NEVER throw out of public
# entry points, so broad subscriber-isolation catches are mandatory. The
# rule below narrows `TooGenericExceptionCaught`'s blocklist to truly
# problematic types (`Throwable`, `Error`) while permitting `Exception` in
# subscriber-dispatch contexts. `RuntimeException` is allowed for the same
# reason (subscribers may throw any of its subclasses).
exceptions:
  TooGenericExceptionCaught:
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - IllegalMonitorStateException
      - NullPointerException
      - IndexOutOfBoundsException
      - Throwable
