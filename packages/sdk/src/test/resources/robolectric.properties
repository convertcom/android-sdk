# Robolectric global configuration for packages/sdk unit tests.
# AC-6.1: Provides a consistent baseline across all test classes in this
# module. Combined with forkEvery=1 in build.gradle.kts (which spawns a fresh
# JVM per test class), this prevents JVM-static singletons (ShadowLog,
# WorkManager) from bleeding across test classes that run in the same shard.
#
# sdk is intentionally not pinned — each test class defaults to the highest
# API level available in the local Robolectric dependency cache. Individual
# classes can pin via @Config(sdk=[N]) when a specific API level is needed.
