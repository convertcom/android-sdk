# Convert Android SDK Demo App — TEST FIXTURES
#
# This file is consumed by `app/build.gradle.kts` ONLY when Gradle is
# invoked with a test or check task in the task graph (e.g.
# `:app:testDebugUnitTest`, `:app:check`, or any combined invocation
# that contains "test"/"check"). At those times the BuildConfig
# tunable fields below override whatever the developer has in
# `local.properties` — keeping unit tests deterministic regardless
# of personal staging credentials.
#
# Every assertion in `app/src/test/...` is written against these
# values. Do NOT edit unless you also update the matching test
# assertions, or the test suite will fail.
#
# `local.properties` is the developer's personal config for running
# the demo against staging via Android Studio / `installDebug` /
# `assembleDebug` — free to set whatever values you like there. The
# two files are fully independent:
#   - a test run reads ONLY `test.properties` (this file).
#   - an assemble / install / launch run reads ONLY `local.properties`.
# `sdk.dir` is read by AGP itself from `local.properties` always —
# it does not flow through this file.
#
# This file IS committed (unlike `local.properties`) so CI and every
# dev machine sees the same test fixtures.

convertSdkKey=demo-sdk-key
convertEnvironment=
convertExperienceKey=test-experience
convertFeatureKey=test-feature
convertGoalKey=purchase-goal
